<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: cabeza('PRIMESHOP - Categorias')}"></head>
<body>

<div class="admin">
    <header th:replace="~{fragments/admin :: barra}"></header>
    <nav th:replace="~{fragments/admin :: menu('categorias')}"></nav>

    <main class="admin__contenido">
        <h1 class="admin__titulo">Categorias</h1>
        <p class="admin__subtitulo">Crea, edita y activa o desactiva las categorias del catalogo</p>

        <div th:if="${mensaje}" class="flash-exito" th:text="${mensaje}"></div>

        <div class="categorias">
            <div class="tabla-envoltura">
                <table class="tabla">
                    <thead>
                        <tr><th>Categoria</th><th>Productos</th><th>Activa</th><th>Acciones</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="c : ${categorias}">
                            <td th:text="${c.nombre}">Nombre</td>
                            <td th:text="${c.cantidadProductos}">0</td>
                            <td>
                                <form th:action="@{/admin/categorias/{id}/estado(id=${c.id})}" method="post">
                                    <button type="submit" class="interruptor-btn" th:classappend="${c.activa} ? 'on' : ''" th:attr="aria-label=${c.activa} ? 'Desactivar' : 'Activar'"></button>
                                </form>
                            </td>
                            <td>
                                <span class="tabla__acciones">
                                    <a class="tabla__accion" th:href="@{/admin/categorias/{id}/editar(id=${c.id})}" aria-label="Editar">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg>
                                    </a>
                                    <form th:action="@{/admin/categorias/{id}/eliminar(id=${c.id})}" method="post" style="display:inline">
                                        <button type="submit" class="tabla__accion tabla__accion--peligro" aria-label="Eliminar">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 14h10l1-14"></path></svg>
                                        </button>
                                    </form>
                                </span>
                            </td>
                        </tr>
                        <tr th:if="${categorias.isEmpty()}">
                            <td colspan="4">No hay categorias todavia.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <aside class="panel categorias__form">
                <h2 class="panel__titulo" th:text="${categoriaForm.id == null} ? 'Nueva categoria' : 'Editar categoria'">Nueva categoria</h2>
                <form th:action="@{/admin/categorias}" th:object="${categoriaForm}" method="post">
                    <input type="hidden" th:field="*{id}">
                    <div class="campo">
                        <label class="campo__etiqueta" for="cat-nombre">Nombre</label>
                        <div class="campo__control"><input type="text" id="cat-nombre" th:field="*{nombre}" placeholder="Ej. Chamarras"></div>
                        <span class="error-campo" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</span>
                    </div>
                    <div class="campo">
                        <label class="campo__etiqueta" for="cat-desc">Descripcion</label>
                        <div class="campo__control"><textarea id="cat-desc" th:field="*{descripcion}" placeholder="Breve descripcion"></textarea></div>
                        <span class="error-campo" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">Error</span>
                    </div>
                    <div class="campo">
                        <label class="estado-fila">
                            <input type="checkbox" th:field="*{activa}">
                            <span>Activa</span>
                        </label>
                    </div>
                    <button type="submit" class="boton boton--primario">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span th:text="${categoriaForm.id == null} ? 'Agregar categoria' : 'Guardar cambios'">Agregar categoria</span>
                    </button>
                </form>
            </aside>
        </div>
    </main>
</div>

</body>
</html>
