<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIMESHOP - Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/main/resources/static/Styles/EstilosCompartidos.css">
  <link rel="stylesheet" href="/src/main/resources/static/Styles/InicioSesion.css">
</head>
<body>
  <main class="autenticacion">
    <a href="Inicio.html" class="autenticacion__cerrar" aria-label="Cerrar">&times;</a>

    <section class="autenticacion__tarjeta">
      <header class="autenticacion__encabezado">
        <span class="logo">
          <img class="logo__img logo__img--mediano" src="/src/main/resources/static/Imagenes/Logo.png" alt="PRIMESHOP">
        </span>
        <h1 class="autenticacion__titulo">Iniciar Sesion</h1>
      </header>

      <form action="#" method="post">
        <div class="campo">
          <label class="campo__etiqueta" for="correo">Correo electronico</label>
          <div class="campo__control">
            <input type="email" id="correo" name="correo" autocomplete="email">
          </div>
        </div>

        <div class="campo">
          <label class="campo__etiqueta" for="password">Contraseña</label>
          <div class="campo__control">
            <input type="password" id="password" name="password" autocomplete="current-password">
            <svg class="campo__icono" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </div>
        </div>

        <div class="autenticacion__acciones">
          <button type="submit" class="boton boton--primario">Iniciar Sesion</button>
          <button type="button" class="boton boton--google">
            Iniciar con Google
            <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
              <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.9 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
              <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16 19 12 24 12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
              <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-3.1-11.3-7.5l-6.5 5C9.6 39.6 16.2 44 24 44z"/>
              <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.1-2.1 3.9-3.9 5.2l6.2 5.2C39.9 35.5 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/>
            </svg>
          </button>
        </div>
      </form>

      <p class="autenticacion__enlace">
        <strong>Primera vez con nosotros?</strong>
        <a href="Registro.html">Registrarse</a>
      </p>

      <p class="autenticacion__legal">
        Al iniciar sesion, aceptas los Terminos y Condiciones y la Politica de privacidad.
      </p>

    </section>
  </main>

</body>
</html>
