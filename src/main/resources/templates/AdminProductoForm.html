<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: cabeza('PRIMESHOP - Producto')}"></head>
<body>

<div class="admin">
    <header th:replace="~{fragments/admin :: barra}"></header>
    <nav th:replace="~{fragments/admin :: menu('productos')}"></nav>

    <main class="admin__contenido">
        <a th:href="@{/admin/productos}" class="admin__volver">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="20" y1="12" x2="4" y2="12"></line><path d="M10 6l-6 6 6 6"></path></svg>
            Volver a productos
        </a>

        <h1 class="admin__titulo" th:text="${productoForm.id == null} ? 'Nuevo producto' : 'Editar producto'">Nuevo producto</h1>
        <p class="admin__subtitulo">Completa la informacion del articulo</p>

        <form th:action="@{/admin/productos}" th:object="${productoForm}" method="post" class="admin-form">
            <input type="hidden" th:field="*{id}">

            <div class="admin-form__campos">
                <div class="campo">
                    <label class="campo__etiqueta" for="nombre">Nombre del producto</label>
                    <div class="campo__control"><input type="text" id="nombre" th:field="*{nombre}"></div>
                    <span class="error-campo" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}">Error</span>
                </div>

                <div class="campos-fila">
                    <div class="campo">
                        <label class="campo__etiqueta" for="categoriaId">Categoria</label>
                        <div class="campo__control">
                            <select id="categoriaId" th:field="*{categoriaId}">
                                <option value="">-- elige una categoria --</option>
                                <option th:each="c : ${categorias}" th:value="${c.id}" th:text="${c.nombre}">Categoria</option>
                            </select>
                        </div>
                        <span class="error-campo" th:if="${#fields.hasErrors('categoriaId')}" th:errors="*{categoriaId}">Error</span>
                    </div>
                    <div class="campo">
                        <label class="campo__etiqueta" for="precio">Precio (MXN)</label>
                        <div class="campo__control"><input type="number" step="0.01" id="precio" th:field="*{precio}"></div>
                        <span class="error-campo" th:if="${#fields.hasErrors('precio')}" th:errors="*{precio}">Error</span>
                    </div>
                </div>

                <div class="campos-fila">
                    <div class="campo">
                        <label class="campo__etiqueta" for="stockInicial">Stock inicial</label>
                        <div class="campo__control"><input type="number" id="stockInicial" th:field="*{stockInicial}"></div>
                        <span class="error-campo" th:if="${#fields.hasErrors('stockInicial')}" th:errors="*{stockInicial}">Error</span>
                    </div>
                    <div class="campo">
                        <label class="campo__etiqueta" for="stockMinimo">Stock minimo (alerta)</label>
                        <div class="campo__control"><input type="number" id="stockMinimo" th:field="*{stockMinimo}"></div>
                        <span class="error-campo" th:if="${#fields.hasErrors('stockMinimo')}" th:errors="*{stockMinimo}">Error</span>
                    </div>
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="color">Color</label>
                    <div class="campo__control"><input type="text" id="color" th:field="*{color}"></div>
                </div>

                <div class="campo">
                    <label class="campo__etiqueta" for="descripcion">Descripcion</label>
                    <div class="campo__control"><textarea id="descripcion" th:field="*{descripcion}"></textarea></div>
                    <span class="error-campo" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}">Error</span>
                </div>

                <div class="campo">
                    <label class="estado-fila">
                        <input type="checkbox" th:field="*{activo}">
                        <span>Activo (visible en la tienda)</span>
                    </label>
                </div>
            </div>

            <div class="admin-form__lateral">
                <span class="campo__etiqueta">Imagen del producto</span>
                <div class="admin-form__imagenes">
                    <span class="subir-imagen">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15l-5-5L5 21"></path><rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle></svg>
                        Proximamente
                    </span>
                </div>
                <p class="admin__subtitulo" style="margin-top:14px">Al editar un producto, el stock se ajusta desde la pantalla de Inventario.</p>
            </div>

            <div class="admin-form__acciones">
                <button type="submit" class="boton boton--primario">Guardar producto</button>
                <a th:href="@{/admin/productos}" class="boton boton--claro">Cancelar</a>
            </div>
        </form>
    </main>
</div>

</body>
</html>
