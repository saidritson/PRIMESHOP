<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: cabeza('PRIMESHOP - Inventario')}"></head>
<body>

<div class="admin">
    <header th:replace="~{fragments/admin :: barra}"></header>
    <nav th:replace="~{fragments/admin :: menu('inventario')}"></nav>

    <main class="admin__contenido" th:with="bajos=${productos.?[stockBajo]},agotados=${productos.?[agotado]}">
        <h1 class="admin__titulo">Control de inventario</h1>
        <p class="admin__subtitulo">Ajusta las existencias (suma o resta) y vigila el stock bajo</p>

        <div th:if="${mensaje}" class="flash-exito" th:text="${mensaje}"></div>

        <div th:if="${!bajos.isEmpty() or !agotados.isEmpty()}" class="alerta">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 3l9 16H3z"></path><line x1="12" y1="9" x2="12" y2="14"></line><circle cx="12" cy="17" r="0.5"></circle></svg>
            <span th:text="${bajos.size()} + ' con stock bajo y ' + ${agotados.size()} + ' agotados'">Alerta</span>
        </div>

        <div class="tabla-envoltura">
            <table class="tabla">
                <thead>
                    <tr><th>Producto</th><th>Stock actual</th><th>Minimo</th><th>Ajuste (+/-)</th><th>Estado</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${productos}">
                        <td>
                            <div class="producto-celda">
                                <span class="tabla__miniatura"><img class="imagen" th:src="${p.imagenUrl}" alt="Producto"></span>
                                <span th:text="${p.nombre}">Nombre</span>
                            </div>
                        </td>
                        <td><span th:classappend="${p.stockBajo or p.agotado} ? 'estado-error' : ''" th:text="${p.stockTotal}">0</span></td>
                        <td th:text="${p.stockMinimo}">0</td>
                        <td>
                            <form th:action="@{/admin/inventario/{id}/ajustar(id=${p.id})}" method="post" class="fila-form">
                                <input type="number" name="cantidad" value="0" aria-label="Cantidad a sumar o restar">
                                <button type="submit">Aplicar</button>
                            </form>
                        </td>
                        <td>
                            <span th:if="${p.agotado}" class="insignia insignia--error">Agotado</span>
                            <span th:if="${p.stockBajo}" class="insignia insignia--warning">Stock bajo</span>
                            <span th:if="${!p.agotado and !p.stockBajo}" class="insignia insignia--exito">Ok</span>
                        </td>
                    </tr>
                    <tr th:if="${productos.isEmpty()}">
                        <td colspan="5">No hay productos en el inventario.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

</body>
</html>
