<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: cabeza('PRIMESHOP - Ordenes')}"></head>
<body>

<div class="admin">
    <header th:replace="~{fragments/admin :: barra}"></header>
    <nav th:replace="~{fragments/admin :: menu('ordenes')}"></nav>

    <main class="admin__contenido">
        <h1 class="admin__titulo">Ordenes</h1>
        <p class="admin__subtitulo">Consulta las ordenes y cambia su estado</p>

        <div th:if="${mensaje}" class="flash-exito" th:text="${mensaje}"></div>

        <nav class="barra-filtros" aria-label="Filtrar por estado">
            <a th:href="@{/admin/ordenes}" class="filtro-chip"
               th:classappend="${estadoActivo == null} ? 'filtro-chip--activo' : ''">Todas</a>
            <a th:each="e : ${estados}" th:href="@{/admin/ordenes(estado=${e})}" class="filtro-chip"
               th:classappend="${estadoActivo != null and estadoActivo.name() == e.name()} ? 'filtro-chip--activo' : ''"
               th:text="${e.descripcion}">Estado</a>
        </nav>

        <div class="tabla-envoltura">
            <table class="tabla">
                <thead>
                    <tr><th>Orden</th><th>Cliente</th><th>Fecha</th><th>Articulos</th><th>Total</th><th>Estado</th></tr>
                </thead>
                <tbody>
                    <tr th:each="pedido : ${pedidos}">
                        <td th:text="${pedido.numeroPedido}">#PS-0000</td>
                        <td th:text="${pedido.usuario != null ? pedido.usuario.nombre : '-'}">Cliente</td>
                        <td th:text="${#dates.format(pedido.fecha, 'dd MMM yyyy')}">--</td>
                        <td th:text="${pedido.detalles != null ? pedido.detalles.size() : 0}">0</td>
                        <td th:text="'$' + ${#numbers.formatInteger(pedido.total, 1, 'COMMA')}">$0</td>
                        <td>
                            <form th:action="@{/admin/ordenes/{id}/estado(id=${pedido.id})}" method="post" class="fila-form">
                                <select name="estado">
                                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e.descripcion}"
                                            th:selected="${e.name() == pedido.estado.name()}">Estado</option>
                                </select>
                                <button type="submit">Aplicar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${pedidos.isEmpty()}">
                        <td colspan="6">No hay ordenes para mostrar.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

</body>
</html>
