<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin :: cabeza('PRIMESHOP - Productos')}"></head>
<body>

<div class="admin">
    <header th:replace="~{fragments/admin :: barra}"></header>
    <nav th:replace="~{fragments/admin :: menu('productos')}"></nav>

    <main class="admin__contenido">
        <div class="admin__encabezado">
            <div>
                <h1 class="admin__titulo">Productos</h1>
                <p class="admin__subtitulo">Da de alta, edita y activa o desactiva productos del catalogo</p>
            </div>
            <a th:href="@{/admin/productos/nuevo}" class="boton boton--primario boton--chico">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                Nuevo producto
            </a>
        </div>

        <div th:if="${mensaje}" class="flash-exito" th:text="${mensaje}"></div>

        <div class="tabla-envoltura">
            <table class="tabla">
                <thead>
                    <tr><th>Producto</th><th>Categoria</th><th>Precio</th><th>Stock</th><th>Activo</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${productos}">
                        <td>
                            <div class="producto-celda">
                                <span class="tabla__miniatura"><img class="imagen" th:src="${p.imagenUrl}" alt="Producto"></span>
                                <span th:text="${p.nombre}">Nombre</span>
                            </div>
                        </td>
                        <td th:text="${p.categoria != null ? p.categoria.nombre : '-'}">Categoria</td>
                        <td th:text="'$' + ${#numbers.formatInteger(p.precio, 1, 'COMMA')}">$0</td>
                        <td><span th:classappend="${p.stockBajo or p.agotado} ? 'estado-error' : ''" th:text="${p.stockTotal}">0</span></td>
                        <td>
                            <form th:action="@{/admin/productos/{id}/estado(id=${p.id})}" method="post">
                                <button type="submit" class="interruptor-btn" th:classappend="${p.activo} ? 'on' : ''" th:attr="aria-label=${p.activo} ? 'Desactivar producto' : 'Activar producto'"></button>
                            </form>
                        </td>
                        <td>
                            <span class="tabla__acciones">
                                <a class="tabla__accion" th:href="@{/admin/productos/{id}/editar(id=${p.id})}" aria-label="Editar">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg>
                                </a>
                                <form th:action="@{/admin/productos/{id}/eliminar(id=${p.id})}" method="post" style="display:inline">
                                    <button type="submit" class="tabla__accion tabla__accion--peligro" aria-label="Eliminar">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M6 6l1 14h10l1-14"></path></svg>
                                    </button>
                                </form>
                            </span>
                        </td>
                    </tr>
                    <tr th:if="${productos.isEmpty()}">
                        <td colspan="6">No hay productos todavia. Crea el primero con "Nuevo producto".</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

</body>
</html>
