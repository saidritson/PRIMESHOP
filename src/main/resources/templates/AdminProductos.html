<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIMESHOP - Admin Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/main/resources/static/Styles/EstilosCompartidos.css">
  <link rel="stylesheet" href="/src/main/resources/static/Styles/Admin.css">
</head>
<body>

  <div class="admin">

    <header class="admin__barra">
      <span class="logo"><img class="logo__img" src="" alt="PRIMESHOP"></span>
      <span class="admin__usuario">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"></path></svg>
        Administrador
      </span>
    </header>

    <nav class="admin__menu" aria-label="Menu de administracion">
      <a href="AdminDashboard.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg> Dashboard</a>
      <a href="AdminProductos.html" class="activo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg> Productos</a>
      <a href="AdminInventario.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.7l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.7l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.3 7L12 12l8.7-5"></path><path d="M12 22V12"></path></svg> Inventario</a>
      <a href="AdminOrdenes.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 3h14v18l-3-2-2 2-2-2-2 2-2-2-3 2z"></path><line x1="8" y1="8" x2="16" y2="8"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg> Ordenes</a>
      <a href="AdminCategorias.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0l-8-8V4h6.6l8 8a2 2 0 0 1 0 2.8z"></path><circle cx="7.5" cy="7.5" r="1.5"></circle></svg> Categorias</a>
    </nav>

    <main class="admin__contenido">

      <div class="admin__encabezado">
        <div>
          <h1 class="admin__titulo">Productos</h1>
          <p class="admin__subtitulo">Da de alta, edita y activa o desactiva productos del catalogo</p>
        </div>
        <a href="AdminProductoForm.html" class="boton boton--primario boton--chico">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          Nuevo producto
        </a>
      </div>

      <div class="toolbar">
        <form class="buscador" action="#" role="search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
          <input type="search" placeholder="Buscar producto" aria-label="Buscar producto">
        </form>
        <select aria-label="Filtrar por categoria">
          <option>Todas las categorias</option>
          <option>Playera</option>
          <option>Sudadera</option>
          <option>Tenis</option>
          <option>Vestidos</option>
        </select>
        <select aria-label="Filtrar por estado">
          <option>Todos</option>
          <option>Activos</option>
          <option>Inactivos</option>
        </select>
      </div>

      <div class="tabla-envoltura">
        <table class="tabla">
          <thead>
            <tr><th>Producto</th><th>Categoria</th><th>Precio</th><th>Stock</th><th>Activo</th><th>Acciones</th></tr>
          </thead>
          <tbody>

            <tr>
              <td>
                <div class="producto-celda">
                  <span class="tabla__miniatura"><img class="imagen" src="" alt="Sudadera oversize"></span>
                  <span>Sudadera Oversize</span>
                </div>
              </td>
              <td>Sudadera</td>
              <td>$450</td>
              <td>24</td>
              <td><label class="interruptor"><input type="checkbox" checked aria-label="Producto activo"><span class="interruptor__pista"></span></label></td>
              <td>
                <span class="tabla__acciones">
                  <a class="tabla__accion" href="AdminProductoForm.html" aria-label="Editar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg></a>
                  <button type="button" class="tabla__accion" aria-label="Desactivar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17.94 17.94A10 10 0 0 1 12 20C5 20 1 12 1 12a18 18 0 0 1 5.06-5.94M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
                </span>
              </td>
            </tr>

            <tr>
              <td>
                <div class="producto-celda">
                  <span class="tabla__miniatura"><img class="imagen" src="" alt="Tenis Air"></span>
                  <span>Tenis Air</span>
                </div>
              </td>
              <td>Tenis</td>
              <td>$500</td>
              <td><span class="estado-error">3</span></td>
              <td><label class="interruptor"><input type="checkbox" checked aria-label="Producto activo"><span class="interruptor__pista"></span></label></td>
              <td>
                <span class="tabla__acciones">
                  <a class="tabla__accion" href="AdminProductoForm.html" aria-label="Editar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg></a>
                  <button type="button" class="tabla__accion" aria-label="Desactivar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M17.94 17.94A10 10 0 0 1 12 20C5 20 1 12 1 12a18 18 0 0 1 5.06-5.94M9.9 4.24A9 9 0 0 1 12 4c7 0 11 8 11 8a18 18 0 0 1-2.16 3.19"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg></button>
                </span>
              </td>
            </tr>

            <tr>
              <td>
                <div class="producto-celda">
                  <span class="tabla__miniatura"><img class="imagen" src="" alt="Vestido de lino"></span>
                  <span>Vestido de Lino</span>
                </div>
              </td>
              <td>Vestidos</td>
              <td>$390</td>
              <td>0</td>
              <td><label class="interruptor"><input type="checkbox" aria-label="Producto inactivo"><span class="interruptor__pista"></span></label></td>
              <td>
                <span class="tabla__acciones">
                  <a class="tabla__accion" href="AdminProductoForm.html" aria-label="Editar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg></a>
                  <button type="button" class="tabla__accion" aria-label="Activar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                </span>
              </td>
            </tr>

          </tbody>
        </table>
      </div>

    </main>

  </div>

</body>
</html>
